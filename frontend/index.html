<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR – 在线从图片中提取文字</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 全局消息弹窗容器 -->
  <div id="messageContainer" style="position:fixed;top:20px;right:20px;z-index:9999;"></div>

  <div class="app" id="app">
    <!-- 1. 顶部标题区 -->
    <header class="page-header" id="page-header">
      <h1 class="page-header__title title-sparkle" id="page-title">
        <span class="sparkle-field" aria-hidden="true">
          <span class="sparkle sparkle--1">✦</span>
          <span class="sparkle sparkle--2">✧</span>
          <span class="sparkle sparkle--3">✦</span>
          <span class="sparkle sparkle--4">✧</span>
          <span class="sparkle sparkle--5">✦</span>
          <span class="sparkle sparkle--6">✧</span>
        </span>
        <span class="title-text">OCR – 在线从图片中提取文字</span>
      </h1>
      <p class="page-header__subtitle" id="page-subtitle">上传 JPG、PNG、PDF 或直接粘贴图片。精确识别，无需注册。</p>
    </header>

    <div class="layout" id="main-layout">
      <main class="content" id="main-content">
        <!-- 2. 拖拽上传区域 -->
        <section class="section" id="upload-section">
          <h2 class="text-16 section-title" id="upload-section-title">上传图片</h2>
          <label class="upload-zone" id="dropZone" for="fileInput">
            <input
              type="file"
              id="fileInput"
              class="file-input"
              accept="image/*"
              multiple
            >
            <div class="upload-zone__content" id="upload-zone-content">
              <span class="upload-zone__image-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="18" x="3" y="3"/>
                  <circle cx="9" cy="9" r="2"/>
                  <path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/>
                </svg>
              </span>
              <p class="upload-zone__hint" id="upload-hint">拖放图片到此处，或点击上传</p>
              <p class="upload-zone__subhint" id="upload-subhint">也可以直接粘贴图片，支持 JPG、PNG、PDF 等格式</p>
              <span class="upload-zone__button">选择图片</span>
            </div>
          </label>
          <div class="action-bar" id="action-bar">
            <button type="button" class="btn btn-primary btn--lg btn-icon" id="btn-start-ocr" aria-label="开始识别" title="开始识别">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4.5 16.5c-1.5 1.26-2 4-2 4s2.74-.5 4-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09Z"/>
                <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2Z"/>
                <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
                <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
              </svg>
            </button>
            <button type="button" class="btn btn-secondary btn--lg" id="btn-cancel-ocr" disabled>取消</button>
          </div>
        </section>

        <!-- 3. 预览区（新增OCR文字框标注图展示） -->
        <div class="workspace" id="workspace">
          <section class="section" id="preview-section">
            <div class="section-header">
              <h2 class="text-16 section-title" id="preview-section-title">图片预览</h2>
              <button type="button" class="btn-text" id="btn-clear-preview">清空预览</button>
            </div>
            <div class="panel" id="preview-area">
              <div class="panel__empty" id="preview-empty">暂无图片，请先上传</div>
              <!-- OCR文字框标注图片区域 -->
              <div id="box-preview-wrap" hidden style="margin-bottom:12px;">
                <p style="font-size:14px;margin:4px 0;color:#333;">文字识别框选图</p>
                <img id="box-preview-img" style="max-width:100%;border:1px solid #ddd;border-radius:6px;" alt="文字区域框选图">
              </div>
              <!-- 原图预览区域 -->
              <div class="preview-grid" id="preview-grid" hidden></div>
            </div>
          </section>

          <section class="section history-panel" id="historySidebar">
            <div class="section-header">
              <h2 class="text-16 section-title sidebar__title" id="sidebar-title">历史记录</h2>
              <button type="button" class="btn-text" id="btn-clear-history">清空历史</button>
              <button type="button" class="btn-text" id="historyBtn">展开/收起历史</button>
            </div>

            <div class="history-content">
              <div class="search-bar" id="history-search-bar">
                <input
                  type="search"
                  class="search-input"
                  id="historyInput"
                  placeholder="时间、文件类型、关键词搜索"
                  autocomplete="off"
                >
                <button type="button" class="btn btn-primary" id="searchBtn">搜索</button>
              </div>

              <ul class="history-list" id="historyList">
                <li class="history-list__empty" id="history-empty">暂无历史记录</li>
              </ul>
            </div>
          </section>
        </div>
      </main>

      <!-- 5. 右侧识别结果边栏 -->
      <aside class="result-sidebar">
        <section class="section" id="result-section">
          <div class="section-header result-header">
            <h2 class="result-title" id="result-section-title">识别结果</h2>
            <p class="result-meta" id="result-meta">字数：0</p>
          </div>
          <div class="result-area" id="result-area">
            <textarea
              class="result-text"
              id="resultText"
              placeholder="点击“开始识别”或上传图片后，文字结果将在这里显示..."
              readonly
            ></textarea>
            <div class="result-actions" id="resultActions">
              <button type="button" class="btn result-btn result-btn--copy" id="copyBtn">复制文本</button>
              <button type="button" class="btn result-btn result-btn--download" id="saveBtn">下载为 TXT</button>
              <button type="button" class="btn result-btn result-btn--clear" id="btn-clear-result">清空</button>
            </div>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <!-- 预览项模板 -->
  <template id="preview-item-template">
    <figure class="preview-item">
      <img src="" alt="预览图" class="preview-item__img">
      <figcaption class="preview-item__name"></figcaption>
    </figure>
  </template>

  <!-- 历史记录项模板 -->
  <template id="history-item-template">
    <li class="history-item">
      <button type="button" class="history-item__btn">
        <span class="history-item__title"></span>
        <time class="history-item__time" datetime=""></time>
      </button>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
