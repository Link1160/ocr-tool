<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR – 在线从图片中提取文字</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">
    <header class="page-header" id="page-header">
      <h1 class="page-header__title title-sparkle" id="page-title">
        <span class="sparkle-field" aria-hidden="true">
          <span class="sparkle sparkle--1">✦</span>
          <span class="sparkle sparkle--2">✧</span>
          <span class="sparkle sparkle--3">✦</span>
          <span class="sparkle sparkle--4">✧</span>
          <span class="sparkle sparkle--5">✦</span>
          <span class="sparkle sparkle--6">✧</span>
        </span>
        <span class="title-text">OCR – 在线从图片中提取文字</span>
      </h1>
      <p class="page-header__subtitle" id="page-subtitle">上传 JPG、PNG、PDF等格式或直接粘贴图片。精确识别，无需注册。</p>
    </header>

    <div class="layout" id="main-layout">
      <main class="content" id="main-content">
        <section class="section" id="upload-section">
          <!-- 上传模式 -->
          <div id="upload-mode">
            <h2 class="text-16 section-title" id="upload-section-title">上传图片</h2>
            <label class="upload-zone" id="upload-zone" for="file-input">
              <input
                type="file"
                id="file-input"
                class="file-input"
                accept="image/*"
                multiple
              >
              <div class="upload-zone__content" id="upload-zone-content">
                <span class="upload-zone__image-icon" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3"/>
                    <circle cx="9" cy="9" r="2"/>
                    <path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/>
                  </svg>
                </span>
                <p class="upload-zone__hint" id="upload-hint">拖放图片到此处，或点击上传</p>
                <p class="upload-zone__subhint" id="upload-subhint">也可以直接粘贴图片，支持 JPG、PNG、PDF 等格式</p>
                <span class="upload-zone__button">选择图片</span>
              </div>
            </label>
          </div>

          <!-- 预览模式（上传图片后显示） -->
          <div id="preview-mode" hidden>
            <div class="section-header">
              <h2 class="text-16 section-title">图片预览</h2>
              <div class="preview-tools">
                <button type="button" class="btn-text" id="btn-add-more">继续添加</button>
                <button type="button" class="btn-text" id="btn-clear-preview">清空预览</button>
              </div>
            </div>
            <div class="panel" id="preview-area">
              <div class="preview-workspace" id="preview-workspace">
                <div class="preview-images" id="preview-images"></div>
                <div class="preview-thumbs" id="preview-thumbs"></div>
              </div>
            </div>
            <div class="crop-actions">
              <button type="button" class="btn btn-primary btn-icon" id="btn-recognize-all" aria-label="识别全部图片" title="识别全部图片">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M4.5 16.5c-1.5 1.26-2 4-2 4s2.74-.5 4-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09Z"/>
                  <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2Z"/>
                  <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
                  <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
                </svg>
              </button>
              <button type="button" class="btn btn-secondary" id="btn-recognize-current">识别当前选中</button>
            </div>
          </div>
        </section>

        <section class="section history-panel" id="sidebar">
            <div class="section-header">
              <h2 class="text-16 section-title sidebar__title" id="sidebar-title">历史记录</h2>
              <div class="history-tools">
                <button type="button" class="btn-text" id="btn-toggle-history">收起历史</button>
                <button type="button" class="btn-text" id="btn-clear-history">清空历史</button>
              </div>
            </div>

            <div class="history-content">
              <div class="search-bar" id="history-search-bar">
                <div class="search-bar__row">
                  <input
                    type="text"
                    class="search-input search-input--date"
                    id="history-date"
                    placeholder="选择日期"
                    readonly
                  >
                  <button type="button" class="btn btn-secondary" id="btn-clear-date">清除日期</button>
                </div>
                <div class="search-bar__row">
                  <input
                    type="search"
                    class="search-input"
                    id="history-search"
                    placeholder="关键词搜索"
                    autocomplete="off"
                  >
                  <button type="button" class="btn btn-primary" id="btn-search">搜索</button>
                </div>
              </div>

              <ul class="history-list" id="history-list">
                <li class="history-list__empty" id="history-empty">暂无历史记录</li>
              </ul>
            </div>

          </section>

      </main>

      <aside class="result-sidebar">
        <section class="section" id="result-section">
          <div class="section-header result-header">
            <h2 class="result-title" id="result-section-title">
              识别结果
            </h2>
            <p class="result-meta" id="result-meta">字数：0</p>
          </div>
          <div class="result-area" id="result-area">
            <textarea
              class="result-text"
              id="result-text"
              placeholder="点击“开始识别”或上传/粘贴图片后，文字结果将在这里显示..."
              readonly
            ></textarea>
            <div class="result-actions" id="result-actions">
              <button type="button" class="btn result-btn result-btn--copy" id="btn-copy">
                复制文本
              </button>
              <button type="button" class="btn result-btn result-btn--download" id="btn-save-txt">
                下载为 TXT
              </button>
              <button type="button" class="btn result-btn result-btn--clear" id="btn-clear-result">
                清空
              </button>
            </div>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <!-- 裁剪弹窗 -->
  <div class="crop-modal" id="crop-modal" hidden>
    <div class="crop-modal__overlay"></div>
    <div class="crop-modal__box">
      <div class="crop-modal__header">
        <span class="crop-modal__title">截取图片</span>
        <span class="crop-modal__counter" id="crop-counter">1 / 1</span>
      </div>
      <div class="crop-modal__body" id="crop-modal-body">
        <canvas id="crop-canvas" class="crop-canvas"></canvas>
        <div class="zoom-controls" id="zoom-controls">
          <button type="button" class="zoom-btn" id="btn-zoom-in" title="放大">+</button>
          <span class="zoom-level" id="zoom-level">100%</span>
          <button type="button" class="zoom-btn" id="btn-zoom-out" title="缩小">-</button>
          <button type="button" class="zoom-btn" id="btn-zoom-reset" title="重置">1:1</button>
        </div>
      </div>
      <div class="crop-modal__footer">
        <p class="crop-modal__tip">拖拽选择截取区域，不选择则使用整张图片。滚轮缩放，Alt+拖拽平移。</p>
        <div class="crop-modal__actions">
          <button type="button" class="btn btn-secondary" id="btn-crop-skip">跳过（使用整张）</button>
          <button type="button" class="btn btn-primary" id="btn-crop-confirm">确认截取</button>
        </div>
      </div>
    </div>
  </div>

  <template id="preview-item-template">
    <figure class="preview-item">
      <img src="" alt="预览图" class="preview-item__img">
      <figcaption class="preview-item__name"></figcaption>
    </figure>
  </template>

  <template id="history-item-template">
    <li class="history-item">
      <button type="button" class="history-item__btn">
        <span class="history-item__title"></span>
        <time class="history-item__time" datetime=""></time>
      </button>
      <button type="button" class="history-item__del" title="删除该条">删除</button>
    </li>
  </template>
  <script src="script.js"></script>
</body>
</html>
