<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR 文字识别工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- 顶部标题 -->
        <header class="page-header">
            <h1 class="page-header__title">
                <span class="title-sparkle">
                    <span class="title-text">OCR 文字识别</span>
                    <div class="sparkle-field">
                        <span class="sparkle sparkle--1">✦</span>
                        <span class="sparkle sparkle--2">✦</span>
                        <span class="sparkle sparkle--3">✦</span>
                        <span class="sparkle sparkle--4">✦</span>
                        <span class="sparkle sparkle--5">✦</span>
                        <span class="sparkle sparkle--6">✦</span>
                    </div>
                </span>
            </h1>
            <p class="page-header__subtitle">上传图片一键识别文字，支持历史记录检索、结果导出</p>
            <span class="status-badge">本地离线识别 · 数据安全</span>
        </header>

        <div class="layout">
            <!-- 左侧主内容区 -->
            <main class="content">
                <!-- 上传区 -->
                <section id="upload-section" class="section">
                    <div class="section-header">
                        <h2 class="section-title">上传图片</h2>
                    </div>
                    <div id="dropZone" class="upload-zone">
                        <input type="file" id="fileInput" class="file-input" accept="image/*">
                        <div class="upload-zone__content">
                            <div class="upload-zone__image-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>
                            <div class="upload-zone__hint">点击或拖拽图片到此处上传</div>
                            <div class="upload-zone__subhint">支持 JPG / PNG / GIF / WEBP / BMP 格式</div>
                            <button class="upload-zone__button" type="button">选择图片</button>
                        </div>
                    </div>
                </section>

                <!-- 工作区：预览 + 结果 -->
                <div class="workspace">
                    <!-- 预览区 -->
                    <section id="preview-section" class="section">
                        <div class="section-header">
                            <h2 class="section-title">图片预览</h2>
                            <button id="btn-clear-preview" class="btn-text">清空预览</button>
                        </div>
                        <div class="panel">
                            <div id="preview-empty" class="panel__empty">暂无预览图片</div>
                            <div id="box-preview-wrap" hidden>
                                <img id="box-preview-img" alt="文字区域框选图" style="width: 100%; height: auto;">
                            </div>
                        </div>
                    </section>

                    <!-- 结果区 -->
                    <section id="result-section" class="section">
                        <div class="section-header result-header">
                            <h2 class="result-title">识别结果</h2>
                            <button id="btn-clear-result" class="btn-text">清空结果</button>
                        </div>
                        <div class="result-area">
                            <textarea id="resultText" class="result-text" readonly placeholder="识别结果将显示在这里..."></textarea>
                            <div id="resultActions" class="result-actions" style="display: none;">
                                <button id="copyBtn" class="btn result-btn result-btn--copy">复制文本</button>
                                <button id="saveBtn" class="btn result-btn result-btn--download">导出TXT</button>
                            </div>
                        </div>
                    </section>
                </div>
            </main>

            <!-- 右侧历史侧边栏 -->
            <aside class="history-panel" id="historySidebar">
                <div class="section-header">
                    <h2 class="sidebar__title">识别历史</h2>
                    <button id="historyBtn" class="btn btn-secondary btn-sm">展开/收起</button>
                </div>
                <div class="history-content">
                    <div class="search-bar">
                        <input type="text" id="historyInput" class="search-input" placeholder="搜索历史记录...">
                        <button id="searchBtn" class="btn btn-primary btn-sm">搜索</button>
                    </div>
                    <ul id="historyList" class="history-list">
                        <li class="history-list__empty">暂无历史记录</li>
                    </ul>
                </div>
                <div class="sidebar__footer">
                    <button id="btn-clear-history" class="btn btn-text">清空全部历史</button>
                </div>
            </aside>
        </div>
    </div>

    <!-- 全局消息提示容器 -->
    <div id="messageContainer"></div>
    <script src="script.js"></script>
</body>
</html>
